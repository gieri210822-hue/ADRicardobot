name: Varredura Diaria ADRicardobot

on:
  schedule:
    - cron: '0 9 * * *'  # Isto corre todos os dias às 09:00 AM UTC
  workflow_dispatch:      # Isto cria um botão para tu correres o bot quando quiseres

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v2

      - name: Configurar Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'

      - name: Instalar Bibliotecas
        run: |
          pip install pandas numpy scipy requests

      - name: Executar Bot
        run: python main.py
